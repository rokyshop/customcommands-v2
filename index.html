<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>

  <style>
    :root{
      --bg:#0f0f0f;
      --card:#1e1e1e;
      --text:white;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      transition:0.3s;
    }

    body.light-mode{
      --bg:#f4f4f4;
      --card:#ffffff;
      --text:#111;
    }

    nav{
      display:flex;
      justify-content:center;
      gap:15px;
      padding:15px;
      background:#1a1a1a;
      flex-wrap:wrap;
    }

    nav button{
      background:#333;
      color:white;
      border:none;
      padding:10px 18px;
      border-radius:20px;
      cursor:pointer;
      transition:0.3s;
    }

    nav button:hover{
      transform:scale(1.1);
      background:#555;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px;
      gap:10px;
      flex-wrap:wrap;
    }

    .status{
      padding:8px 15px;
      border-radius:20px;
      font-weight:bold;
      display:inline-block;
      min-width:120px;
    }

    .card{
      background:var(--card);
      width:320px;
      margin:30px auto;
      padding:25px;
      border-radius:25px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .tab{ display:none; padding:20px; text-align:center; }
    .active-tab{ display:block; }

    .button{
      padding:10px 15px;
      border:none;
      border-radius:15px;
      cursor:pointer;
      margin:5px;
      transition:0.3s;
      background:#333;
      color:white;
    }

    .button:hover{
      transform:scale(1.1);
      background:#555;
    }

    .admin-panel{
      display:none;
      background:var(--card);
      padding:20px;
      margin:40px auto;
      width:350px;
      border-radius:20px;
      text-align:center;
    }

    input, textarea{
      width:90%;
      margin:5px;
      padding:8px;
      border-radius:10px;
      border:1px solid #444;
      background:transparent;
      color:inherit;
    }

    .social-btn{
      display:inline-block;
      padding:10px 15px;
      margin:5px;
      border-radius:15px;
      text-decoration:none;
      color:white;
      transition:0.3s;
    }

    .social-btn:hover{
      transform:scale(1.1);
    }

    .discord{ background:#5865F2; }
    .tiktok{ background:#000; }
    .youtube{ background:red; }

    .clock{
      font-weight:bold;
      margin-right:10px;
    }

    .visitor{
      font-size:14px;
      opacity:0.9;
      margin-right:10px;
    }
  </style>
</head>

<body>

<header>
  <h2>My Website</h2>
  <div>
    <span class="clock" id="clock"></span>
    <span class="visitor" id="visitorCount"></span>
    <button class="button" onclick="toggleMode()" title="Mode clair/sombre">🌙</button>
  </div>
</header>

<nav>
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('social')">Social / Business</button>
</nav>

<div id="home" class="tab active-tab">
  <div class="card">
    <h3>Server Status</h3>
    <div id="serverStatus" class="status">Online</div>
  </div>
</div>

<div id="social" class="tab">
  <h3>Social / Business</h3>
  <!-- Mets tes vrais liens -->
  <a href="#" class="social-btn discord">Discord</a>
  <a href="#" class="social-btn tiktok">TikTok</a>
  <a href="#" class="social-btn youtube">YouTube</a>
</div>

<div style="text-align:center;">
  <button class="button" onclick="login()">Admin Login</button>
  <button class="button" onclick="logout()">Logout</button>
</div>

<div class="admin-panel" id="adminPanel">
  <h3>Admin Panel</h3>

  <input type="text" id="newServerStatus" placeholder="Server Status Text" />
  <br />
  <input type="color" id="serverColor" value="#00aa00" />
  <br />

  <button class="button" onclick="updateServer()">Update Server</button>

  <p style="font-size:12px; opacity:0.8; margin-top:10px;">
    Note : sur un site GitHub Pages (statique), un “admin” en JS n’est pas sécurisé.
    Ici c’est juste pour faire joli, et c’est sauvegardé en localStorage.
  </p>
</div>

<script>
  // ⚠️ Pas sécurisé (visible dans le code). Pour un vrai admin il faut un backend.
  let password = "max";
  let isAdmin = false;

  /* Tabs */
  function showTab(tab){
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active-tab"));
    const el = document.getElementById(tab);
    if (el) el.classList.add("active-tab");
  }

  /* Login */
  function login(){
    const userPass = prompt("Enter password:");
    if(userPass === password){
      isAdmin = true;
      document.getElementById("adminPanel").style.display = "block";
      alert("Admin mode activated");
    } else {
      alert("Wrong password!");
    }
  }

  function logout(){
    isAdmin = false;
    document.getElementById("adminPanel").style.display = "none";
    alert("Logged out");
  }

  /* Server Status (persisté) */
  function applySavedServerStatus(){
    const savedText = localStorage.getItem("serverStatusText");
    const savedColor = localStorage.getItem("serverStatusColor");

    const status = document.getElementById("serverStatus");
    if (!status) return;

    status.innerText = savedText || "Online";
    status.style.background = savedColor || "green";
  }

  function updateServer(){
    if(!isAdmin) return alert("Admin only");

    const text = document.getElementById("newServerStatus").value.trim();
    const color = document.getElementById("serverColor").value;

    if(text){
      localStorage.setItem("serverStatusText", text);
      localStorage.setItem("serverStatusColor", color || "green");
      applySavedServerStatus();
    } else {
      alert("Mets un texte de statut.");
    }
  }

  /* Dark / Light Mode (persisté) */
  function applySavedMode(){
    const saved = localStorage.getItem("themeMode");
    if (saved === "light") document.body.classList.add("light-mode");
  }

  function toggleMode(){
    document.body.classList.toggle("light-mode");
    localStorage.setItem("themeMode", document.body.classList.contains("light-mode") ? "light" : "dark");
  }

  /* Live Clock */
  function updateClock(){
    const now = new Date();
    const clock = document.getElementById("clock");
    if (!clock) return;
    clock.innerText = now.toLocaleTimeString() + " | ";
  }

  /* Visitor Counter */
  function updateVisits(){
    const key = "visits";
    const visits = Number(localStorage.getItem(key) || "0") + 1;
    localStorage.setItem(key, String(visits));

    const out = document.getElementById("visitorCount");
    if (out) out.innerText = "Visitors: " + visits;
  }

  // Init
  applySavedMode();
  applySavedServerStatus();
  updateClock();                 // ✅ affiché tout de suite
  setInterval(updateClock, 1000);
  updateVisits();
</script>

</body>
  </html>
